<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <base href="/cashier/frontend/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後廚出餐工作看板 (KDS)</title>
    <!-- Google Fonts Outfit & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #ff6f00;
            --primary-hover: #e65c00;
            --success: #10b981;
            --success-hover: #059669;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-main: 'Outfit', 'Noto Sans TC', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 頂部標題 */
        .kds-header {
            height: 70px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 24px;
            color: var(--primary);
        }

        .brand-title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .brand-title span {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-left: 8px;
        }

        .ws-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #64748b;
        }

        .status-dot.active {
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* 主工作區 */
        .kds-main {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* 待製作大欄 (75%) */
        .kds-column-preparing {
            flex: 3;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* 已完成小欄 (25%) */
        .kds-column-ready {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            min-width: 250px;
        }

        .column-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.01);
        }

        .column-header h2 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .column-header .badge {
            background-color: var(--primary);
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .badge.badge-success {
            background-color: var(--success);
        }

        /* 滾動卡片清單 */
        .card-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .kds-column-ready .card-list {
            grid-template-columns: 1fr;
            padding: 16px;
            gap: 12px;
        }

        /* 準備中訂單卡片 */
        .kds-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .kds-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            padding: 12px 16px;
            background-color: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-id {
            font-size: 18px;
            font-weight: 800;
            color: #ff6f00;
        }

        .card-table {
            font-size: 13px;
            font-weight: 700;
            background-color: #ff6f00;
            color: #ffffff;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 6px;
            margin-bottom: 4px;
        }

        .item-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .item-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .item-qty {
            color: #ff9800;
            font-weight: 800;
        }

        .item-notes {
            font-size: 12px;
            color: #f43f5e;
            font-weight: 800;
            padding-left: 8px;
            margin-top: 2px;
            display: block;
        }

        .card-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.08);
        }

        /* 廚房按鈕 */
        .btn-finish {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.15);
        }

        .btn-finish:hover {
            background-color: var(--success-hover);
        }

        .btn-finish:active {
            transform: scale(0.98);
        }

        /* 取餐卡片 (簡易版) */
        .ready-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            animation: slideIn 0.2s ease forwards;
        }

        .ready-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .ready-title {
            font-size: 14px;
            font-weight: 700;
            color: #ff6f00;
        }

        .ready-table {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .btn-clear {
            background: rgba(16, 185, 129, 0.1);
            border: 1.5px solid var(--success);
            color: var(--success);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            font-size: 16px;
        }

        .btn-clear:hover {
            background-color: var(--success) !important;
            color: white !important;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <header class="kds-header">
        <div class="brand-section">
            <i class="fa-solid fa-fire-burner brand-icon"></i>
            <h1 class="brand-title">後廚出餐看板 <span>Kitchen Display System</span></h1>
        </div>
        <div class="ws-status-bar">
            <span class="status-dot active" id="ws-dot"></span>
            <span id="ws-text">即時伺服器連線成功</span>
        </div>
    </header>

    <!-- 工作區域 -->
    <main class="kds-main">
        <!-- 待製作看板 -->
        <section class="kds-column-preparing">
            <div class="column-header">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> 待製作 / 準備中</h2>
                <span class="badge" id="count-preparing">0</span>
            </div>
            <div class="card-list" id="list-preparing">
                <div class="empty-state">
                    <i class="fa-solid fa-circle-check"></i>
                    <p>目前沒有待製作餐點，可以稍作休息！</p>
                </div>
            </div>
        </section>

        <!-- 請取餐看板 -->
        <section class="kds-column-ready">
            <div class="column-header">
                <h2><i class="fa-solid fa-bell"></i> 待取餐 / 請取餐</h2>
                <span class="badge badge-success" id="count-ready">0</span>
            </div>
            <div class="card-list" id="list-ready">
                <!-- 取餐列表 -->
            </div>
        </section>
    </main>

    <!-- 語音發聲 / 音效 -->
    <script>
        // 播放新單提示音的簡單 Web Audio 函數 (防瀏覽器拒絕 play)
        function playChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.12); // A5
                
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            } catch(e) {}
        }
    </script>
    
    <!-- 登入 Modal -->
    <div class="modal-backdrop" id="modal-auth" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center;">
        <div class="modal-card" style="background: #1e293b; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; width: 90%; max-width: 400px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <div class="modal-header" style="text-align: center; margin-bottom: 20px;">
                <i class="fa-solid fa-fire-burner" style="font-size: 36px; color: #ff6f00; margin-bottom: 12px;"></i>
                <h3 style="margin: 0; font-size: 20px; color: #f8fafc; font-family: var(--font-main);">後廚系統登入</h3>
                <p style="margin: 5px 0 0 0; font-size: 13px; color: #94a3b8; font-family: var(--font-main);">請輸入人員帳戶以使用廚房看板</p>
            </div>
            <div class="modal-body" style="margin-bottom: 20px;">
                <form id="auth-form" onsubmit="return false;">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label for="auth-username" style="display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; font-family: var(--font-main);">帳號</label>
                        <input type="text" id="auth-username" style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #f8fafc; outline: none; font-size: 14px;" placeholder="請輸入帳號" required autocomplete="username">
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label for="auth-password" style="display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; font-family: var(--font-main);">密碼</label>
                        <input type="password" id="auth-password" style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #f8fafc; outline: none; font-size: 14px;" placeholder="請輸入密碼" required autocomplete="current-password">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-finish" id="btn-auth-submit" style="width: 100%; padding: 12px; background: #ff6f00; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 15px;">登入後廚系統</button>
            </div>
        </div>
    </div>
    
    <!-- 引入後廚邏輯 -->
    <script src="kitchen.js"></script>
</body>
</html>
